name: Test image scan
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          image: "alpine:3.18"
          registry-username: ""
          registry-password: ""
          format: "spdx-json"
          output-file: "/tmp/sbom-image-output.spdx.json"
          upload-artifact: "false"
          upload-release-assets: "false"
          dependency-snapshot: "false"
      - name: Assert SBOM output file exists
        run: |
          if [ ! -f "/tmp/sbom-image-output.spdx.json" ]; then
            echo "FAIL: expected SBOM output file at /tmp/sbom-image-output.spdx.json"
            exit 1
          fi
          echo "PASS: SBOM output file exists"
      - name: Assert SBOM output is valid JSON
        run: |
          if ! python3 -m json.tool /tmp/sbom-image-output.spdx.json > /dev/null 2>&1; then
            echo "FAIL: SBOM output is not valid JSON"
            exit 1
          fi
          echo "PASS: SBOM output is valid JSON"
