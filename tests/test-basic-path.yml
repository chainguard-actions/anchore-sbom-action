name: Test basic path scan
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          path: "."
          format: "spdx-json"
          artifact-name: "sbom-test-output.spdx.json"
          output-file: "/tmp/sbom-output.spdx.json"
          syft-version: "v1.19.0"
          upload-artifact: "false"
          upload-release-assets: "false"
          dependency-snapshot: "false"
      - name: Assert SBOM output file exists
        run: |
          echo "Checking SBOM output file..."
          if [ ! -f "/tmp/sbom-output.spdx.json" ]; then
            echo "FAIL: expected /tmp/sbom-output.spdx.json to exist"
            exit 1
          fi
          echo "PASS: SBOM output file exists"
      - name: Assert SBOM output is valid JSON
        run: |
          echo "Validating SBOM JSON..."
          if ! python3 -m json.tool /tmp/sbom-output.spdx.json > /dev/null 2>&1; then
            echo "FAIL: SBOM output is not valid JSON"
            exit 1
          fi
          echo "PASS: SBOM output is valid JSON"
