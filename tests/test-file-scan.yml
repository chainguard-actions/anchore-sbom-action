name: Test file scan
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          file: "actions/hardened/anchore--sbom-action/v0.24.0/action.yml"
          format: "spdx-json"
          output-file: "/tmp/sbom-file-output.spdx.json"
          upload-artifact: "false"
          upload-release-assets: "false"
          dependency-snapshot: "false"
      - name: Assert SBOM output file exists
        run: |
          echo "Checking SBOM output file from file scan..."
          if [ ! -f "/tmp/sbom-file-output.spdx.json" ]; then
            echo "FAIL: expected /tmp/sbom-file-output.spdx.json to exist"
            exit 1
          fi
          echo "PASS: SBOM output file exists"
